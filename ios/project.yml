name: MarketPulse
options:
  bundleIdPrefix: dev.marketpulse
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
schemes:
  MarketPulse:
    build:
      targets:
        MarketPulse: all
        MarketPulseTests: [test]
    test:
      targets:
        - MarketPulseTests
targets:
  MarketPulse:
    type: application
    platform: iOS
    settings:
      base:
        ALWAYS_SEARCH_USER_PATHS: NO
        PRODUCT_NAME: MarketPulse
        PRODUCT_BUNDLE_IDENTIFIER: dev.marketpulse.MarketPulse
        INFOPLIST_FILE: MarketPulse/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
    sources:
      - path: MarketPulse
    resources:
      - path: MarketPulse/Resources
    info:
      path: MarketPulse/Info.plist
      properties:
        CFBundleDisplayName: MarketPulse
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  MarketPulseTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        ALWAYS_SEARCH_USER_PATHS: NO
        PRODUCT_BUNDLE_IDENTIFIER: dev.marketpulse.MarketPulseTests
        INFOPLIST_FILE: MarketPulseTests/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MarketPulse.app/MarketPulse"
    sources:
      - path: MarketPulseTests
    dependencies:
      - target: MarketPulse
    info:
      path: MarketPulseTests/Info.plist
      properties:
        CFBundleDisplayName: MarketPulseTests
