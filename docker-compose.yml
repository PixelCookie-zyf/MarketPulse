services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CACHE_BACKEND=redis
      - GOLDAPI_KEY=${GOLDAPI_KEY}
      - ALPHAVANTAGE_KEY=${ALPHAVANTAGE_KEY}
      - EASTMONEY_PROXY_BASE_URL=${EASTMONEY_PROXY_BASE_URL}
      - EASTMONEY_PROXY_TOKEN=${EASTMONEY_PROXY_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always

volumes:
  redis_data:
