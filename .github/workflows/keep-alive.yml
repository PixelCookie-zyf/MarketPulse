name: Keep Render Alive

on:
  schedule:
    # Every 10 minutes, 24/7
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 120 https://marketpulse-t9jx.onrender.com/health || echo "Server waking up..."
